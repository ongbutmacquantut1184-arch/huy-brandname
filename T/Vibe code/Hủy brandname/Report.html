<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Inter', sans-serif; background:#f0f2f5; color:#1e293b; padding:20px; }
    .container { max-width:1200px; margin:0 auto; background:#fff; border-radius:16px; padding:24px; box-shadow:0 4px 20px rgba(0,0,0,0.05); }
    h2 { font-weight:600; margin-bottom:20px; }
    .filter-row { display:flex; gap:20px; flex-wrap:wrap; margin-bottom:20px; align-items:flex-end; }
    .form-group { display:flex; flex-direction:column; min-width:200px; }
    label { font-weight:500; margin-bottom:6px; }
    select, input { padding:8px 12px; border:1px solid #cbd5e1; border-radius:8px; font-family:inherit; }
    .btn { padding:10px 20px; border:none; border-radius:8px; background:#2563eb; color:#fff; font-weight:500; cursor:pointer; }
    .btn:hover { background:#1d4ed8; }
    .btn-export { background:#10b981; }
    .btn-export:hover { background:#059669; }
    table { width:100%; border-collapse:collapse; margin-top:20px; font-size:14px; }
    th, td { border:1px solid #e2e8f0; padding:8px 12px; text-align:center; }
    th { background:#f1f5f9; font-weight:600; }
    td:first-child, th:first-child { text-align:left; }
    .yes { color:#059669; font-weight:500; }
    .empty { color:#94a3b8; }
  </style>
</head>
<body>
<div class="container">
  <h2>📊 Báo cáo hủy Brandname theo nhà cung cấp</h2>
  
  <div class="filter-row">
    <div class="form-group">
      <label>Tháng</label>
      <select id="monthSelect">
        <option value="">-- Tất cả --</option>
      </select>
    </div>
    <div class="form-group">
      <label>Nhà cung cấp (chọn nhiều)</label>
      <select id="providerSelect" multiple size="5" style="height:auto;">
      </select>
    </div>
    <button class="btn" onclick="loadReport()">Xem báo cáo</button>
    <button class="btn btn-export" onclick="exportToCSV()">📥 Xuất CSV</button>
  </div>

  <div id="reportArea">
    <p style="color:#94a3b8;">Chọn tháng và ít nhất một nhà cung cấp để xem báo cáo.</p>
  </div>
</div>

<script>
  var reportData = null;

  // Khởi tạo
  window.onload = function() {
    // Load danh sách tháng từ dữ liệu
    google.script.run.withSuccessHandler(function(months) {
      var sel = document.getElementById('monthSelect');
      sel.innerHTML = '<option value="">-- Tất cả --</option>';
      months.forEach(function(m) {
        sel.innerHTML += `<option value="${m}">${m}</option>`;
      });
    }).getDistinctMonths();
    
    // Load danh sách provider
    google.script.run.withSuccessHandler(function(providers) {
      var sel = document.getElementById('providerSelect');
      providers.forEach(function(p) {
        var opt = document.createElement('option');
        opt.value = p.id;
        opt.text = p.name;
        sel.appendChild(opt);
      });
    }).getAllProviders();
  };

  function loadReport() {
    var month = document.getElementById('monthSelect').value;
    var providerSelect = document.getElementById('providerSelect');
    var selected = [];
    for (var i = 0; i < providerSelect.options.length; i++) {
      if (providerSelect.options[i].selected) selected.push(providerSelect.options[i].value);
    }
    if (selected.length === 0) {
      alert('Vui lòng chọn ít nhất một nhà cung cấp.');
      return;
    }
    google.script.run.withSuccessHandler(function(data) {
      reportData = data;
      renderReport(data);
    }).getReportData(month, selected);
  }

  function renderReport(data) {
    if (!data || data.brands.length === 0) {
      document.getElementById('reportArea').innerHTML = '<p>Không có dữ liệu.</p>';
      return;
    }
    var operators = data.operators;
    var brands = data.brands;
    var html = '<table><thead><tr><th>STT</th><th>Brandname</th>';
    operators.forEach(function(op) {
      html += `<th>Hủy ${op.name}</th>`;
    });
    html += '<th>Lĩnh vực</th><th>Đơn vị sử dụng Brandname</th></tr></thead><tbody>';
    brands.forEach(function(brand, idx) {
      html += `<tr><td>${idx+1}</td><td>${brand.brandName}</td>`;
      operators.forEach(function(op) {
        var status = brand.operatorStatus[op.id] || '-';
        html += `<td class="${status === 'Yes' ? 'yes' : 'empty'}">${status}</td>`;
      });
      html += `<td>${brand.cp || ''}</td><td>${brand.owner || ''}</td></tr>`;
    });
    html += '</tbody></table>';
    document.getElementById('reportArea').innerHTML = html;
  }

  function exportToCSV() {
    if (!reportData || !reportData.brands.length) {
      alert('Chưa có dữ liệu để xuất.');
      return;
    }
    var ops = reportData.operators;
    var csv = ['STT,Brandname,' + ops.map(o => `Hủy ${o.name}`).join(',') + ',Lĩnh vực,Đơn vị sử dụng Brandname'];
    reportData.brands.forEach(function(brand, idx) {
      var row = [idx+1, `"${brand.brandName}"`];
      ops.forEach(function(op) {
        row.push(brand.operatorStatus[op.id] || '-');
      });
      row.push(`"${brand.cp || ''}"`);
      row.push(`"${brand.owner || ''}"`);
      csv.push(row.join(','));
    });
    var blob = new Blob(['\uFEFF' + csv.join('\n')], {type: 'text/csv;charset=utf-8;'}); // BOM for Excel
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'Bao_cao_huy_brandname.csv';
    a.click();
  }
</script>
</body>
</html>
